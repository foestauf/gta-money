name: Promote Docker Image

on:
  repository_dispatch:
    types: [promote]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to promote (e.g., 0.0.1)'
        required: true
      commit_sha:
        description: 'Commit SHA of the Docker image to promote'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  promote:
    name: Promote Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Set version and SHA
        id: config
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "sha=${{ github.event.inputs.commit_sha }}" >> $GITHUB_OUTPUT
            echo "skip_wait=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
            echo "sha=${{ github.event.client_payload.sha }}" >> $GITHUB_OUTPUT
            echo "skip_wait=false" >> $GITHUB_OUTPUT
          fi

      - name: Wait for CI to complete
        if: steps.config.outputs.skip_wait == 'false'
        uses: lewagon/wait-on-check-action@v1.5.0
        with:
          ref: ${{ steps.config.outputs.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          running-workflow-name: "Promote Docker Image"
          allowed-conclusions: success

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install regctl
        run: |
          curl -sL https://github.com/regclient/regclient/releases/latest/download/regctl-linux-amd64 > regctl
          chmod +x regctl

      - name: Promote image with version tags
        run: |
          VERSION="${{ steps.config.outputs.version }}"
          SHA="${{ steps.config.outputs.sha }}"
          MAJOR_MINOR=$(echo "$VERSION" | sed 's/\.[0-9]*$//')
          SOURCE_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${SHA}"

          echo "Promoting ${SOURCE_IMAGE} to version ${VERSION}"

          ./regctl image copy "${SOURCE_IMAGE}" "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
          ./regctl image copy "${SOURCE_IMAGE}" "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${MAJOR_MINOR}"
          ./regctl image copy "${SOURCE_IMAGE}" "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

      - name: Trigger homelab-infra update
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.HOMELAB_DISPATCH_TOKEN }}
          repository: foestauf/homelab-infra
          event-type: update-image
          client-payload: |
            {
              "app_name": "gta-money",
              "image_tag": "${{ steps.config.outputs.version }}"
            }
